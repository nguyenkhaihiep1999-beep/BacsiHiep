<!DOCTYPE html>
<html>
<head>
    <title>Dự đoán bệnh tim</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }
        input {
            width: 95%;
            padding: 6px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }
        h3 {
            color: red;
        }
    </style>
</head>
<body>

<h2> BÁC SĨ KHÁI HIỆP TRỊ BỆNH TIM</h2>

<form method="POST">

    <label>Tuổi (age)</label>
    <input type="number" name="age" required>

    <label>Giới tính (sex: 1 = Nam, 0 = Nữ)</label>
    <input type="number" name="sex" required>

    <label>Loại đau ngực (cp: 0–3)</label>
    <input type="number" name="cp" required>

    <label>Huyết áp nghỉ (trestbps)</label>
    <input type="number" name="trestbps" required>

    <label>Cholesterol (chol)</label>
    <input type="number" name="chol" required>

    <label>Đường huyết cao (fbs: 1 = Có, 0 = Không)</label>
    <input type="number" name="fbs" required>

    <label>Điện tâm đồ (restecg: 0–2)</label>
    <input type="number" name="restecg" required>

    <label>Nhịp tim tối đa (thalach)</label>
    <input type="number" name="thalach" required>

    <label>Đau thắt khi vận động (exang: 1 = Có, 0 = Không)</label>
    <input type="number" name="exang" required>

    <label>Độ chênh ST (oldpeak)</label>
    <input type="number" step="0.1" name="oldpeak" required>

    <label>Độ dốc ST (slope: 0–2)</label>
    <input type="number" name="slope" required>

    <label>Số mạch bị tắc (ca: 0–3)</label>
    <input type="number" name="ca" required>

    <label>Thal (1 = bình thường, 2 = lỗi, 3 = nặng)</label>
    <input type="number" name="thal" required>

    <button type="submit">🔍 Dự đoán</button>
</form>

{% if result %}
    <h3>Kết quả: {{ result }}</h3>
{% endif %}

</body>
</html>
